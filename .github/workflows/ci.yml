name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, mbstring, pdo, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP lint
        run: find . -path './vendor' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run test suite
        run: php -d zend.assertions=1 -d assert.exception=1 tests/run-tests.php

      - name: Production readiness check
        run: php bin/mnb-scraper ci:check --strict

      - name: Benchmark smoke test
        run: php bin/mnb-scraper benchmark:run --iterations=100 --json
