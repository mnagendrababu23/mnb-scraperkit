name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, mbstring
          coverage: none
      - name: Validate composer metadata
        run: composer validate --strict --no-check-lock
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run test suite
        run: php -d zend.assertions=1 -d assert.exception=1 tests/run-tests.php
      - name: Run CI readiness check
        run: php bin/mnb-scraper ci:check --strict
      - name: Run command contract validation
        run: php bin/mnb-scraper compat:commands --validate --json
